<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مهام الأسبوع">
<meta name="theme-color" content="#111111">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23111111'/%3E%3Ctext x='50' y='65' font-size='46' text-anchor='middle' fill='white' font-family='Arial'%3E%E2%9C%93%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>مهام الأسبوع</title>
<style>
  :root{
    --bg:#ffffff;
    --surface:#f7f7f5;
    --border:#e9e9e7;
    --border-strong:#d9d9d6;
    --ink:#191919;
    --ink-soft:#6b6b68;
    --ink-faint:#9b9b98;
    --done:#9b9b98;
    --danger:#e03e3e;
    --warn:#d9730d;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Tahoma',sans-serif;
    color:var(--ink);
    padding:24px 14px 60px;
  }
  .sheet{
    max-width:640px;
    margin:0 auto;
  }

  h1{
    font-size:28px;
    font-weight:800;
    margin:6px 0 4px;
    color:var(--ink);
    letter-spacing:-.3px;
  }
  .subtitle{
    color:var(--ink-soft);
    font-size:14px;
    margin-bottom:22px;
  }

  .progress-wrap{
    margin:16px 0 24px;
    padding:14px 16px;
    background:var(--surface);
    border-radius:10px;
    border:1px solid var(--border);
  }
  .progress-stats{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .progress-stats b{color:var(--ink);font-size:15px;font-weight:800;}
  .progress-track{
    height:6px;
    background:var(--border);
    border-radius:10px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--ink);
    border-radius:10px;
    transition:width .4s ease;
  }

  .add-row{
    display:flex;
    gap:8px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }
  .add-row input[type="text"]{
    flex:1;
    min-width:150px;
    padding:10px 12px;
    border:1px solid var(--border-strong);
    border-radius:8px;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Tahoma',sans-serif;
    font-size:14px;
    color:var(--ink);
  }
  .add-row input[type="text"]:focus, .add-row input[type="date"]:focus{
    outline:none;
    border-color:var(--ink);
  }
  .add-row input[type="date"]{
    padding:10px 8px;
    border:1px solid var(--border-strong);
    border-radius:8px;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Tahoma',sans-serif;
    font-size:13px;
    color:var(--ink);
  }
  .add-row button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:var(--ink);
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Tahoma',sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    transition:opacity .2s;
  }
  .add-row button:hover{opacity:.85;}

  .task{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:12px 6px;
    border-bottom:1px solid var(--border);
    border-radius:6px;
  }
  .task:hover{background:var(--surface);}
  .task:last-child{border-bottom:none;}
  .checkbox{
    width:20px;height:20px;
    border:1.5px solid var(--border-strong);
    border-radius:5px;
    flex-shrink:0;
    margin-top:2px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg);
    transition:.15s;
  }
  .checkbox:hover{border-color:var(--ink);}
  .checkbox.checked{
    background:var(--ink);
    border-color:var(--ink);
  }
  .checkbox.checked::after{
    content:"✓";
    color:#fff;
    font-weight:900;
    font-size:12px;
  }
  .task-body{flex:1;min-width:0;}
  .task-name{
    font-size:15px;
    font-weight:600;
    color:var(--ink);
  }
  .task.done .task-name{
    text-decoration:line-through;
    color:var(--ink-faint);
  }
  .task-meta{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:4px;
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .badge{
    padding:2px 8px;
    border-radius:20px;
    font-size:11px;
    font-weight:700;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--ink-soft);
  }
  .badge.overdue{background:#fdecec;color:var(--danger);border-color:#f7d4d4;}
  .badge.soon{background:#fdf0e1;color:var(--warn);border-color:#f5deb8;}
  .del-btn{
    background:none;border:none;color:var(--ink-faint);
    cursor:pointer;font-size:15px;padding:2px 6px;
    opacity:.6;transition:.2s;
  }
  .del-btn:hover{opacity:1;color:var(--danger);}

  .empty{
    text-align:center;
    color:var(--ink-soft);
    padding:30px 0;
    font-size:15px;
  }
  .footer-note{
    text-align:center;
    color:var(--ink-faint);
    font-size:12px;
    margin-top:22px;
  }

  .modal-overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,.4);
    align-items:center;justify-content:center;
    padding:16px;
    z-index:100;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:12px;
    max-width:480px;
    width:100%;
    max-height:88vh;
    overflow-y:auto;
    padding:22px 20px;
    box-shadow:0 20px 50px rgba(0,0,0,.2);
  }
  .modal h2{
    font-size:19px;
    font-weight:800;
    color:var(--ink);
    margin:0 0 4px;
  }
  .modal .close-btn{
    float:left;
    background:none;border:none;
    font-size:18px;color:var(--ink-soft);
    cursor:pointer;
    width:28px;height:28px;
    border-radius:6px;
  }
  .modal .close-btn:hover{background:var(--surface);}
  .modal label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    margin:16px 0 6px;
    text-transform:uppercase;
    letter-spacing:.3px;
  }
  .modal textarea{
    width:100%;
    min-height:90px;
    padding:10px 12px;
    border:1px solid var(--border-strong);
    border-radius:8px;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Tahoma',sans-serif;
    font-size:14px;
    color:var(--ink);
    resize:vertical;
  }
  .modal textarea:focus, .modal input:focus{outline:none;border-color:var(--ink);}
  .modal input[type="date"], .modal input[type="text"], .modal input[type="url"]{
    width:100%;
    padding:9px 12px;
    border:1px solid var(--border-strong);
    border-radius:8px;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Tahoma',sans-serif;
    font-size:14px;
    color:var(--ink);
  }
  .link-row{
    display:flex;gap:6px;margin-bottom:8px;
  }
  .link-row input{flex:1;}
  .link-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 10px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    margin-bottom:6px;
    font-size:13px;
  }
  .link-item a{color:var(--ink);text-decoration:none;word-break:break-all;font-weight:600;}
  .link-item a:hover{text-decoration:underline;}
  .link-item button{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:14px;}
  .add-link-btn{
    padding:8px 14px;
    border:none;border-radius:8px;
    background:var(--surface);
    border:1px solid var(--border-strong);
    color:var(--ink);font-size:13px;font-weight:700;
    cursor:pointer;
  }
  .add-link-btn:hover{background:var(--border);}

  /* Subtasks */
  .subtask-list{margin-top:4px;}
  .subtask-item{
    display:flex;align-items:center;gap:8px;
    padding:6px 4px;
    border-bottom:1px solid var(--border);
  }
  .subtask-item:last-child{border-bottom:none;}
  .subtask-checkbox{
    width:17px;height:17px;
    border:1.5px solid var(--border-strong);
    border-radius:4px;
    flex-shrink:0;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    background:var(--bg);
  }
  .subtask-checkbox.checked{background:var(--ink);border-color:var(--ink);}
  .subtask-checkbox.checked::after{content:"✓";color:#fff;font-size:10px;font-weight:900;}
  .subtask-name{flex:1;font-size:13.5px;color:var(--ink);}
  .subtask-item.done .subtask-name{text-decoration:line-through;color:var(--ink-faint);}
  .subtask-del{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:13px;opacity:.6;}
  .subtask-del:hover{opacity:1;color:var(--danger);}
  .subtask-add-row{display:flex;gap:6px;margin-top:8px;}
  .subtask-add-row input{flex:1;padding:8px 10px;border:1px solid var(--border-strong);border-radius:7px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Tahoma',sans-serif;font-size:13.5px;}
  .subtask-add-row button{padding:8px 12px;border:none;border-radius:7px;background:var(--surface);border:1px solid var(--border-strong);font-size:13px;font-weight:700;cursor:pointer;}
  .subtask-add-row button:hover{background:var(--border);}
  .sub-progress{font-size:11.5px;color:var(--ink-faint);margin-right:2px;}

  .save-note-btn{
    margin-top:20px;
    width:100%;
    padding:11px;
    border:none;border-radius:8px;
    background:var(--ink);
    color:#fff;font-weight:700;font-size:14px;
    cursor:pointer;
  }
  .save-note-btn:hover{opacity:.85;}
  .saved-flash{
    text-align:center;
    color:var(--ink-soft);
    font-size:12px;
    margin-top:8px;
    height:16px;
  }
</style>
</head>
<body>
<div class="sheet">
  <h1>مهام الأسبوع</h1>
  <div class="subtitle">نظّم مهامك، حدد الديدلاين، وتابع إنجازك أول بأول</div>

  <div class="progress-wrap">
    <div class="progress-stats">
      <span>خلصت <b id="doneCount">0</b> من <b id="totalCount">0</b></span>
      <span>باقي <b id="remainingCount">0</b></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="add-row">
    <input type="text" id="taskInput" placeholder="اكتب مهمة جديدة...">
    <input type="date" id="deadlineInput">
    <button onclick="addTask()">إضافة</button>
  </div>

  <div id="taskList"></div>
  <div class="footer-note">بياناتك محفوظة على هذا الجهاز فقط</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-btn" onclick="closeTask()">✕</button>
    <h2 id="modalTitle"></h2>

    <label>الديدلاين</label>
    <input type="date" id="modalDeadline">

    <label>مهام فرعية</label>
    <div class="subtask-list" id="subtaskList"></div>
    <div class="subtask-add-row">
      <input type="text" id="subtaskInput" placeholder="أضف مهمة فرعية...">
      <button onclick="addSubtask()">إضافة</button>
    </div>

    <label>ملاحظات</label>
    <textarea id="modalNotes" placeholder="اكتب هنا أي تفاصيل أو خطوات أو أفكار عن المهمة..."></textarea>

    <label>روابط الملفات</label>
    <div id="linksContainer"></div>
    <div class="link-row">
      <input type="text" id="linkNameInput" placeholder="اسم الملف/الرابط" style="flex:0.8;">
      <input type="url" id="linkUrlInput" placeholder="https://...">
      <button class="add-link-btn" onclick="addLink()">إضافة</button>
    </div>

    <button class="save-note-btn" onclick="saveTaskDetails()">حفظ</button>
    <div class="saved-flash" id="savedFlash"></div>
  </div>
</div>

<script>
let tasks = [];

const initialTasks = [
  "فيديو بطوط",
  "كورس انت نجم",
  "كورس العقيدة ثانوي",
  "كورس العقيده الآباء",
  "موسيقى مسرحيه ابتدائي",
  "اخلص المشروع",
  "بحث إعداد خدام (الابائيات)",
  "تحضير حيوان و معلومه",
  "سيستيم (فلوس)"
];

async function loadTasks(){
  try{
    const result = await window.storage.get('weekly-tasks-data');
    if(result && result.value){
      tasks = JSON.parse(result.value);
    } else {
      tasks = initialTasks.map((name,i)=>({
        id: 'task_'+i+'_'+Date.now(),
        name, deadline: '', done: false, subtasks: [], notes:'', links:[]
      }));
      await saveTasks();
    }
  }catch(e){
    tasks = initialTasks.map((name,i)=>({
      id: 'task_'+i+'_'+Date.now(),
      name, deadline: '', done: false, subtasks: [], notes:'', links:[]
    }));
    await saveTasks();
  }
  render();
}

async function saveTasks(retries){
  retries = retries || 0;
  try{
    const result = await window.storage.set('weekly-tasks-data', JSON.stringify(tasks));
    if(!result && retries < 2){
      await new Promise(r=>setTimeout(r,300));
      return saveTasks(retries+1);
    }
  }catch(e){
    if(retries < 2){
      await new Promise(r=>setTimeout(r,300));
      return saveTasks(retries+1);
    }
    console.error('save failed after retries', e);
  }
}

function addTask(){
  const input = document.getElementById('taskInput');
  const deadlineInput = document.getElementById('deadlineInput');
  const name = input.value.trim();
  if(!name) return;
  tasks.push({
    id: 'task_'+Date.now(),
    name,
    deadline: deadlineInput.value || '',
    done: false,
    subtasks: [],
    notes: '',
    links: []
  });
  input.value = '';
  deadlineInput.value = '';
  saveTasks();
  render();
}

function toggleTask(id){
  const t = tasks.find(x=>x.id===id);
  if(t){ t.done = !t.done; saveTasks(); render(); }
}

function deleteTask(id){
  tasks = tasks.filter(x=>x.id!==id);
  saveTasks();
  render();
}

function deadlineBadge(deadline, done){
  if(!deadline || done) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(deadline);
  const diffDays = Math.round((d-today)/86400000);
  const dateStr = d.toLocaleDateString('ar-EG', {day:'numeric', month:'short'});
  if(diffDays < 0) return `<span class="badge overdue">متأخر • ${dateStr}</span>`;
  if(diffDays <= 1) return `<span class="badge soon">قريب • ${dateStr}</span>`;
  return `<span class="badge">${dateStr}</span>`;
}

function render(){
  const list = document.getElementById('taskList');
  const total = tasks.length;
  const done = tasks.filter(t=>t.done).length;
  const remaining = total - done;

  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('remainingCount').textContent = remaining;
  document.getElementById('progressFill').style.width = total ? (done/total*100)+'%' : '0%';

  if(total === 0){
    list.innerHTML = '<div class="empty">مفيش مهام لسه، ضيف أول مهمة ليك 👆</div>';
    return;
  }

  list.innerHTML = tasks.map(t=>{
    const noteFlag = (t.notes && t.notes.trim()) ? 1 : 0;
    const linkCount = (t.links || []).length;
    const subtasks = t.subtasks || [];
    const subDone = subtasks.filter(s=>s.done).length;
    const extras = [];
    if(subtasks.length) extras.push(`<span class="badge">${subDone}/${subtasks.length} فرعية</span>`);
    if(noteFlag) extras.push(`<span class="badge">📝 ملاحظة</span>`);
    if(linkCount) extras.push(`<span class="badge">🔗 ${linkCount}</span>`);
    return `
    <div class="task ${t.done?'done':''}">
      <div class="checkbox ${t.done?'checked':''}" onclick="toggleTask('${t.id}')"></div>
      <div class="task-body" onclick="openTask('${t.id}')" style="cursor:pointer;">
        <div class="task-name">${escapeHtml(t.name)}</div>
        <div class="task-meta">${deadlineBadge(t.deadline, t.done)}${extras.join('')}</div>
      </div>
      <button class="del-btn" onclick="deleteTask('${t.id}')" title="حذف">✕</button>
    </div>
  `;}).join('');
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('taskInput').addEventListener('keypress', function(e){
  if(e.key === 'Enter') addTask();
});

// ---- Task detail modal ----
let currentTaskId = null;
let currentLinks = [];
let currentSubtasks = [];

function openTask(id){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  currentTaskId = id;
  currentLinks = (t.links || []).slice();
  currentSubtasks = (t.subtasks || []).map(s=>({...s}));
  document.getElementById('modalTitle').textContent = t.name;
  document.getElementById('modalDeadline').value = t.deadline || '';
  document.getElementById('modalNotes').value = t.notes || '';
  document.getElementById('savedFlash').textContent = '';
  renderLinks();
  renderSubtasks();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeTask(){
  document.getElementById('modalOverlay').classList.remove('open');
  currentTaskId = null;
}

function renderLinks(){
  const container = document.getElementById('linksContainer');
  if(currentLinks.length === 0){
    container.innerHTML = '';
    return;
  }
  container.innerHTML = currentLinks.map((l,i)=>`
    <div class="link-item">
      <a href="${escapeHtml(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.name || l.url)}</a>
      <button onclick="removeLink(${i})" title="حذف الرابط">✕</button>
    </div>
  `).join('');
}

function addLink(){
  const nameInput = document.getElementById('linkNameInput');
  const urlInput = document.getElementById('linkUrlInput');
  let url = urlInput.value.trim();
  if(!url) return;
  if(!/^https?:\/\//i.test(url)) url = 'https://' + url;
  currentLinks.push({ name: nameInput.value.trim(), url });
  nameInput.value = '';
  urlInput.value = '';
  renderLinks();
}

function removeLink(index){
  currentLinks.splice(index,1);
  renderLinks();
}

function renderSubtasks(){
  const container = document.getElementById('subtaskList');
  if(currentSubtasks.length === 0){
    container.innerHTML = '';
    return;
  }
  container.innerHTML = currentSubtasks.map((s,i)=>`
    <div class="subtask-item ${s.done?'done':''}">
      <div class="subtask-checkbox ${s.done?'checked':''}" onclick="toggleSubtask(${i})"></div>
      <div class="subtask-name">${escapeHtml(s.name)}</div>
      <button class="subtask-del" onclick="removeSubtask(${i})">✕</button>
    </div>
  `).join('');
}

function addSubtask(){
  const input = document.getElementById('subtaskInput');
  const name = input.value.trim();
  if(!name) return;
  currentSubtasks.push({ name, done:false });
  input.value = '';
  renderSubtasks();
}

function toggleSubtask(index){
  currentSubtasks[index].done = !currentSubtasks[index].done;
  renderSubtasks();
}

function removeSubtask(index){
  currentSubtasks.splice(index,1);
  renderSubtasks();
}

document.getElementById('subtaskInput').addEventListener('keypress', function(e){
  if(e.key === 'Enter') addSubtask();
});

async function saveTaskDetails(){
  const t = tasks.find(x=>x.id===currentTaskId);
  if(!t) return;
  t.deadline = document.getElementById('modalDeadline').value || '';
  t.notes = document.getElementById('modalNotes').value;
  t.links = currentLinks.slice();
  t.subtasks = currentSubtasks.slice();
  await saveTasks();
  render();
  const flash = document.getElementById('savedFlash');
  flash.textContent = 'تم الحفظ ✓';
  setTimeout(()=>{ if(flash) flash.textContent=''; }, 1800);
}

document.getElementById('modalOverlay').addEventListener('click', function(e){
  if(e.target === this) closeTask();
});

loadTasks();

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(err){
      console.warn('SW registration failed', err);
    });
  });
}
</script>
</body>
</html>
